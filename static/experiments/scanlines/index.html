<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Scanlines</title>
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body class="scanlinesExp">
		<div id="crt-scanline-photons" aria-hidden="true"></div>

		<header class="hud">
			<div class="hud__titleRow">
				<div class="hud__title">Scanlines</div>
				<a class="hud__more" href="/">(home)</a>
			</div>
			<p class="hud__desc">
				A focused look at the site’s CRT background: static scanlines + vignette, with the occasional “photon” sweep.
			</p>
		</header>

		<section id="controls" class="controls" aria-label="Scanlines controls" hidden>
			<div class="controls__row">
				<label class="controls__toggle" for="toggleBg">
					<input id="toggleBg" type="checkbox" checked />
					<span class="controls__toggleUi" aria-hidden="true"></span>
					<span class="controls__toggleText">Scanlines + vignette</span>
				</label>
			</div>
			<div class="controls__row">
				<label class="controls__toggle" for="togglePhoton">
					<input id="togglePhoton" type="checkbox" checked />
					<span class="controls__toggleUi" aria-hidden="true"></span>
					<span class="controls__toggleText">Photon sweep</span>
				</label>
			</div>

			<div class="controls__row controls__row--stack">
				<label class="controls__label" for="frequency">Photon frequency</label>
				<select id="frequency" class="controls__select">
					<option value="rare">Rare (10–18s)</option>
					<option value="default" selected>Default (5–10s)</option>
					<option value="often">Often (2–5s)</option>
				</select>
			</div>

		</section>

		<noscript>
			<div class="fallback" role="status">
				<div class="fallback__title">JavaScript is disabled</div>
				<p class="fallback__body">
					The scanlines background still works, but the photon sweep and controls require JavaScript.
				</p>
			</div>
		</noscript>

		<script src="./scanline-photons.js"></script>
		<script>
			(function () {
				var body = document.body;
				var controls = document.getElementById("controls");

				var toggleBg = document.getElementById("toggleBg");
				var togglePhoton = document.getElementById("togglePhoton");
				var frequency = document.getElementById("frequency");

				function applyBg() {
					body.classList.toggle("scanlinesExp--noBg", !toggleBg.checked);
				}

				function gapRangeFor(value) {
					if (value === "rare") return { min: 10000, max: 18000 };
					if (value === "often") return { min: 2000, max: 5000 };
					return { min: 5000, max: 10000 };
				}

				function applyPhoton() {
					if (!window.ScanlinePhotons) return;
					var enabled = !!togglePhoton.checked;
					var gap = gapRangeFor(frequency.value);
					window.ScanlinePhotons.setConfig({ enabled: enabled, minGapMs: gap.min, maxGapMs: gap.max });
				}

				applyBg();
				applyPhoton();

				toggleBg.addEventListener("change", applyBg);
				togglePhoton.addEventListener("change", applyPhoton);
				frequency.addEventListener("change", applyPhoton);

				window.addEventListener("keydown", function (e) {
					if (e.key !== "`") return;
					controls.hidden = !controls.hidden;
				});
			})();
		</script>
	</body>
</html>
