<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Starfield</title>
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
		<div id="canvas-container" aria-hidden="true"></div>
		<div class="hud" aria-hidden="true">
			<div class="hud__title">Starfield</div>
		</div>
		<section id="debug-panel" class="debug" hidden>
			<header class="debug__header">
				<div class="debug__title">Debug</div>
				<div class="debug__hint"><kbd>`</kbd> to toggle</div>
			</header>
			<div class="debug__row">
				<label class="debug__label" for="density">Density</label>
				<input id="density" class="debug__range" type="range" min="0" max="1" step="0.01" value="0.85" />
				<div class="debug__value" id="densityValue">0.85</div>
			</div>
			<div class="debug__row">
				<label class="debug__label" for="brightness">Brightness</label>
				<input
					id="brightness"
					class="debug__range"
					type="range"
					min="0"
					max="1"
					step="0.01"
					value="0.90"
				/>
				<div class="debug__value" id="brightnessValue">0.90</div>
			</div>
		</section>

		<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
					"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
				}
			}
		</script>
		<script type="module" src="./main.js"></script>
	</body>
</html>
